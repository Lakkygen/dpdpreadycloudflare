<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="scanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="pageGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F8FAFC"/>
    </linearGradient>
  </defs>
  <!-- Webpage -->
  <rect x="30" y="50" width="100" height="80" rx="6" fill="url(#pageGrad)" stroke="#E2E8F0" stroke-width="2"/>
  <rect x="40" y="60" width="80" height="6" rx="3" fill="#CBD5E1"/>
  <rect x="40" y="72" width="60" height="4" rx="2" fill="#E2E8F0"/>
  <rect x="40" y="80" width="70" height="4" rx="2" fill="#E2E8F0"/>
  <rect x="40" y="88" width="50" height="4" rx="2" fill="#E2E8F0"/>
  <!-- Magnifying glass -->
  <circle cx="110" cy="120" r="35" fill="none" stroke="url(#scanGrad)" stroke-width="6"/>
  <line x1="135" y1="145" x2="155" y2="165" stroke="#475569" stroke-width="6" stroke-linecap="round"/>
  <!-- Glow -->
  <circle cx="110" cy="120" r="40" fill="url(#scanGrad)" opacity="0.1"/>
</svg>
