<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 200" fill="none">
  <defs>
    <linearGradient id="emptyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E0E7FF"/>
      <stop offset="100%" stop-color="#F0F9FF"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="120" cy="100" r="80" fill="url(#emptyGrad)" opacity="0.5"/>
  <!-- Clipboard -->
  <rect x="70" y="40" width="100" height="120" rx="8" fill="white" stroke="#E2E8F0" stroke-width="2"/>
  <rect x="90" y="20" width="60" height="30" rx="6" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="2"/>
  <!-- Shield on clipboard -->
  <path d="M100 70c0-4 2-6 5-7 3 1 5 3 5 7v5c0 4-2 7-5 9-3-2-5-5-5-9V70z" fill="url(#shieldGrad)" stroke="#2563EB" stroke-width="1.5"/>
  <path d="M103 78l2 2 4-4" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Text lines -->
  <rect x="120" y="72" width="40" height="4" rx="2" fill="#CBD5E1"/>
  <rect x="120" y="80" width="30" height="3" rx="1.5" fill="#E2E8F0"/>
  <rect x="120" y="88" width="25" height="3" rx="1.5" fill="#E2E8F0"/>
  <text x="120" y="140" font-family="system-ui, sans-serif" font-size="12" fill="#94A3B8" text-anchor="middle">No scans yet</text>
  <text x="120" y="156" font-family="system-ui, sans-serif" font-size="10" fill="#CBD5E1" text-anchor="middle">Run your first scan to see results</text>
</svg>
